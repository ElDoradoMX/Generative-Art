<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optimized Form Packing</title>
    <!-- Include p5.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        canvas {
            display: block;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
<script>
// --- Configuration & Constants ---
const NUM_FORMS = 260;
const PADDING = 12;
const MIN_RADIUS = 15;
const MAX_RADIUS = 140;

let forms = [];

function setup() {
    createCanvas(800, 800);
    noLoop(); 
    
    // Generate radii plan: larger forms first, decreasing exponentially
    let radiusPlan = [];
    for (let i = 0; i < NUM_FORMS; i++) {
        let t = i / (NUM_FORMS - 1);
        let r = lerp(MAX_RADIUS, MIN_RADIUS, Math.pow(t, 1.5));
        radiusPlan.push(r);
    }
    
    packForms(radiusPlan);
}

function draw() {
    background(240);
    
    // Draw all successfully packed forms
    for (let f of forms) {
        drawForm(f);
    }
}

// --- Packing Algorithm (Optimized) ---
function packForms(radiusPlan) {
    const attemptsPerForm = 70;
    const shrinkSteps = 4;
    const shrinkFactor = 0.85;
    
    for (let baseRadius of radiusPlan) {
        let placed = false;
        
        for (let shrink = 0; shrink <= shrinkSteps && !placed; shrink++) {
            let r = baseRadius * Math.pow(shrinkFactor, shrink);
            if (r < MIN_RADIUS) break;
            
            for (let a = 0; a < attemptsPerForm; a++) {
                let x = rndRange(-r * 0.15, width + r * 0.15);
                let y = rndRange(-r * 0.15, height + r * 0.15);
                
                if (isValidPlacement(x, y, r)) {
                    forms.push(makeForm(x, y, r));
                    placed = true;
                    break; 
                }
            }
        }
    }
}

// Optimized overlap check using squared distances (avoids expensive Math.sqrt)
function isValidPlacement(x, y, r) {
    for (let f of forms) {
        let dx = x - f.x;
        let dy = y - f.y;
        let distanceSq = dx * dx + dy * dy;
        
        let minDistance = r + f.r + PADDING;
        let minDistanceSq = minDistance * minDistance;
        
        if (distanceSq < minDistanceSq) {
            return false; // Overlap detected
        }
    }
    return true;
}

// --- Form Generation & Drawing ---
function makeForm(x, y, r) {
    // Generate a simple color palette for each form
    let hue = rndRange(0, 360);
    return {
        x: x,
        y: y,
        r: r,
        color: `hsl(${Math.floor(hue)}, 70%, 60%)`,
        innerCircles: Math.floor(rndRange(2, 5))
    };
}

function drawForm(f) {
    push();
    fill(f.color);
    stroke(0, 50);
    strokeWeight(2);
    
    // Draw nested circles based on form properties
    for (let i = f.innerCircles; i > 0; i--) {
        let currentR = (f.r * i) / f.innerCircles;
        ellipse(f.x, f.y, currentR * 2);
    }
    pop();
}

// Helper utility for random ranges
function rndRange(min, max) {
    return Math.random() * (max - min) + min;
}
</script>
</body>
</html>
